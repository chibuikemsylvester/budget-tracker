<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>💰 Budget Tracker</h1>
            <p class="subtitle">Track your income and expenses</p>
        </header>

        <div class="summary-cards">
            <div class="card income-card">
                <h3>Income</h3>
                <p class="amount" id="total-income">$0.00</p>
            </div>
            <div class="card expense-card">
                <h3>Expenses</h3>
                <p class="amount" id="total-expenses">$0.00</p>
            </div>
            <div class="card balance-card">
                <h3>Balance</h3>
                <p class="amount" id="balance">$0.00</p>
            </div>
        </div>

        <div class="transaction-form">
            <h2>Add Transaction</h2>
            <form id="transaction-form">
                <div class="form-group">
                    <label for="description">Description</label>
                    <input type="text" id="description" placeholder="Enter description" required>
                </div>
                <div class="form-group">
                    <label for="amount">Amount</label>
                    <input type="number" id="amount" placeholder="Enter amount" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="type">Type</label>
                    <select id="type" required>
                        <option value="income">Income</option>
                        <option value="expense">Expense</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" required>
                        <option value="">Select category</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Add Transaction</button>
            </form>
        </div>

        <div class="transactions-section">
            <div class="section-header">
                <h2>Transactions</h2>
                <button id="clear-all" class="btn btn-secondary">Clear All</button>
            </div>
            <div class="filter-controls">
                <select id="filter-type">
                    <option value="all">All Transactions</option>
                    <option value="income">Income Only</option>
                    <option value="expense">Expenses Only</option>
                </select>
            </div>
            <div id="transactions-list" class="transactions-list"></div>
        </div>
    </div>

    <!-- Vercel Web Analytics -->
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>

    <script type="module" src="app.js"></script>
</body>
</html>
